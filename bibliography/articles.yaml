      tags: [exo, accelerator, schedule, dsl]
    - id: dace-sdfg-2019
      title: "Stateful Dataflow Multigraphs: A Data-Centric Model for Performance Portability on Heterogeneous Architectures"
      year: 2019
      url: "https://arxiv.org/abs/1902.10345"
