# Structured linked bibliography for agentic AscendC/operator optimization.
# Status values: seed, core, supporting, to-verify.

categories:
  ascend_npu_specific:
    - id: ascendoptimizer-2026
      title: "AscendOptimizer: Episodic Agent for Ascend NPU Operator Optimization"
      year: 2026
      url: "https://arxiv.org/abs/2603.23566"
      status: core
      relevance: "Closest agentic AscendC operator-optimization work; host-side tiling plus kernel-side scheduling/pipelining loop."
      tags: [ascend, ascendc, npu, agent, tiling, kernel-optimization]
    - id: ascendcraft-2026
      title: "AscendCraft: Automatic Ascend NPU Kernel Generation via DSL-Guided Transcompilation"
      year: 2026
      url: "https://arxiv.org/abs/2601.22760"
      status: core
      relevance: "DSL-guided path for making Ascend execution semantics explicit before lowering to AscendC."
      tags: [ascend, dsl, llm, transcompilation, programming-model]
    - id: ascendkernelgen-2026
      title: "AscendKernelGen: A Systematic Study of LLM-Based Kernel Generation for Neural Processing Units"
      year: 2026
      url: "https://arxiv.org/abs/2601.07160"
      status: core
      relevance: "Shows general LLM weakness on NPU kernels and proposes domain-specific generation/evaluation."
      tags: [ascend, npu, llm, benchmark, execution-feedback]
    - id: multikernelbench-2025
      title: "MultiKernelBench: A Multi-Platform Benchmark for Kernel Generation"
      year: 2025
      url: "https://arxiv.org/abs/2507.17773"
      status: core
      relevance: "Evaluation benchmark across Nvidia GPU, Huawei NPU, and Google TPU."
      tags: [benchmark, kernel-generation, huawei-npu, gpu, tpu]
    - id: ascend-roofline-2025
      title: "Squeezing Operator Performance Potential for the Ascend Architecture"
      year: 2025
      url: "https://cs.nju.edu.cn/tianchen/lunwen/2025/asplos25-yuhang.pdf"
      doi: "10.1145/3676641.3716243"
      status: core
      relevance: "Component-based roofline and underutilization analysis for Ascend operators; useful basis for performance evidence views."
      tags: [ascend, roofline, bottleneck-analysis, performance-modeling]
    - id: npumeter
      title: "NPUMeter: Automatic Operator Optimization for Ascend NPU with Accurate Performance Modeling"
      year: null
      url: "https://dl.acm.org/doi/10.1145/3820380"
      status: to-verify
      relevance: "Potentially relevant for performance modeling and design-space exploration on Ascend."
      tags: [ascend, npu, performance-modeling, autotuning]

  agentic_kernel_optimization:
    - id: kernelbench-2025
      title: "KernelBench: Can LLMs Write Efficient GPU Kernels?"
      year: 2025
      url: "https://arxiv.org/abs/2502.10517"
      status: core
      relevance: "Benchmark and metric framing for correct-and-fast generated kernels."
      tags: [llm, gpu, kernel-generation, benchmark, profiling-feedback]
    - id: tritonbench-2025
      title: "TritonBench: Benchmarking Large Language Model Capabilities for Generating Triton Operators"
      year: 2025
      url: "https://arxiv.org/abs/2502.14752"
      status: core
      relevance: "Triton operator generation benchmark; highlights LLM weakness in performance-aware DSL coding."
      tags: [triton, llm, benchmark, kernel-generation]
    - id: geak-2025
      title: "Geak: Introducing Triton Kernel AI Agent & Evaluation Benchmarks"
      year: 2025
      url: "https://arxiv.org/abs/2507.23194"
      status: supporting
      relevance: "Agentic feedback-loop framework for AMD Triton kernel generation."
      tags: [triton, amd, mi300x, agent, feedback-loop]
    - id: compilergpt-2025
      title: "CompilerGPT: Leveraging Large Language Models for Analyzing and Acting on Compiler Optimization Reports"
      year: 2025
      url: "https://arxiv.org/abs/2506.06227"
      status: supporting
      relevance: "Compiler reports as agent input; close to compiler-to-AI information pipeline."
      tags: [compiler-reports, llm, optimization, harness]
    - id: codeopt-survey-2025
      title: "Language Models for Code Optimization: Survey, Challenges and Future Directions"
      year: 2025
      url: "https://arxiv.org/abs/2501.01277"
      status: supporting
      relevance: "Broad survey for related work framing."
      tags: [survey, llm, code-optimization]

  compiler_ir_and_autotuning:
    - id: mlir-2020
      title: "MLIR: A Compiler Infrastructure for the End of Moore's Law"
      year: 2020
      url: "https://arxiv.org/abs/2002.11054"
      status: core
