      tags: [dace, sdfg, dataflow, double-buffering]
    - id: tiramisu-2018
      title: "Tiramisu: A Polyhedral Compiler for Expressing Fast and Portable Code"
      year: 2018
      url: "https://arxiv.org/abs/1804.10694"
      status: supporting
      relevance: "Separates algorithm, loop transformations, data layouts, and communication."
      tags: [tiramisu, polyhedral, schedule, ir]

