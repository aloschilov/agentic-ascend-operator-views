      year: 2017
      url: "https://cacm.acm.org/research/halide/"
      status: supporting
      relevance: "Canonical algorithm/schedule separation."
      tags: [halide, schedule, dsl]
    - id: exo-2022
      title: "Exo: A Usable User-Schedulable Programming Language for Accelerators"
      year: 2022
      url: "https://people.csail.mit.edu/yuka/pdf/exo_pldi2022_full.pdf"
      status: supporting
